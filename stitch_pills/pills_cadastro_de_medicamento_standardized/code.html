<!DOCTYPE html>

<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Registrar Medicamento - Pills</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#8b5cf6",
            "primary-light": "#ede9fe",
            "background-light": "#fbfaff",
            "background-dark": "#0f0d1a",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
    }

    .pill-radio:checked+label {
      background-color: #8b5cf6;
      color: white;
      border-color: #8b5cf6;
    }

    .pill-radio:checked+label .material-symbols-outlined {
      color: white;
      font-variation-settings: 'FILL' 1;
    }

    .pill-radio:checked+label .text-label {
      color: white;
    }

    .channel-checkbox:checked+label {
      border-color: #8b5cf6;
      background-color: #ede9fe;
    }

    .channel-checkbox:checked+label .material-symbols-outlined {
      font-variation-settings: 'FILL' 1;
      color: #8b5cf6;
    }

    body {
      background-color: #fbfaff;
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
  <div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">
      <!-- Top Navigation Bar -->
      <header
        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-100 dark:border-slate-800 px-6 py-4 md:px-40 bg-white/80 backdrop-blur-md dark:bg-slate-900/80 sticky top-0 z-10">
        <div class="flex items-center gap-3 text-primary">
          <div class="size-8">
            <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z"
                fill="currentColor"></path>
            </svg>
          </div>
          <h2 class="text-xl font-bold leading-tight tracking-tight">Pills</h2>
        </div>
        <button
          class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-primary-light hover:text-primary transition-all">
          <span class="material-symbols-outlined text-[22px]">help_outline</span>
        </button>
      </header>
      <main class="flex flex-1 justify-center py-10 px-4">
        <div class="layout-content-container flex flex-col max-w-[640px] flex-1">
          <!-- Header Section -->
          <div class="flex flex-col gap-2 mb-10 px-2 text-center">
            <h1 class="text-slate-900 dark:text-slate-100 text-4xl font-black tracking-tight">Novo Medicamento</h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg">Configure seus lembretes e cuide bem de você.</p>
          </div>
          <!-- Form Card -->
          <form class="bg-white dark:bg-slate-900/50 rounded-xl border border-primary/10 shadow-sm overflow-hidden">
            <!-- Basic Info Section -->
            <div class="p-8 border-b border-slate-50 dark:border-slate-800">
              <h3 class="text-[11px] font-bold uppercase tracking-[0.15em] text-primary mb-6">Informações Básicas</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <label class="flex flex-col gap-1.5 col-span-2">
                  <span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Nome do Medicamento</span>
                  <input
                    class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-4 focus:ring-primary/10 h-14 px-4 transition-all"
                    placeholder="Ex: Paracetamol 500mg" type="text" />
                </label>
                <label class="flex flex-col gap-1.5">
                  <span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Dosagem</span>
                  <input
                    class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-4 focus:ring-primary/10 h-14 px-4 transition-all"
                    placeholder="Ex: 1 comprimido" type="text" />
                </label>
                <label class="flex flex-col gap-1.5">
                  <span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Frequência</span>
                  <select
                    class="form-select block w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-4 focus:ring-primary/10 h-14 px-4 transition-all">
                    <option value="">Selecione...</option>
                    <option value="4h">A cada 4 horas</option>
                    <option value="6h">A cada 6 horas</option>
                    <option value="8h">A cada 8 horas</option>
                    <option value="12h">A cada 12 horas</option>
                    <option value="daily">Uma vez ao dia</option>
                    <option value="custom">Personalizado</option>
                  </select>
                </label>
              </div>
            </div>
            <!-- Schedule Section -->
            <div class="p-8 border-b border-slate-50 dark:border-slate-800 bg-primary/5">
              <h3 class="text-[11px] font-bold uppercase tracking-[0.15em] text-primary mb-6">Período do Tratamento</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <label class="flex flex-col gap-1.5">
                  <span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Data de Início</span>
                  <input
                    class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-4 focus:ring-primary/10 h-14 px-4 transition-all"
                    type="date" />
                </label>
                <label class="flex flex-col gap-1.5">
                  <span class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Data de Término</span>
                  <input
                    class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-4 focus:ring-primary/10 h-14 px-4 transition-all"
                    type="date" />
                </label>
              </div>
            </div>
            <!-- Criticality Section -->
            <div class="p-8 border-b border-slate-50 dark:border-slate-800">
              <h3 class="text-[11px] font-bold uppercase tracking-[0.15em] text-primary mb-6">Criticidade</h3>
              <div class="flex gap-4">
                <div class="flex-1">
                  <input checked="" class="hidden pill-radio" id="crit-low" name="criticality" type="radio" />
                  <label
                    class="flex flex-col items-center justify-center p-5 rounded-2xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:border-primary/30 transition-all text-slate-500 dark:text-slate-400 group h-32"
                    for="crit-low">
                    <span
                      class="material-symbols-outlined text-3xl mb-2 text-slate-400 group-hover:text-primary transition-colors">pill</span>
                    <span class="text-[10px] font-bold uppercase tracking-wider text-label">Baixa</span>
                  </label>
                </div>
                <div class="flex-1">
                  <input class="hidden pill-radio" id="crit-med" name="criticality" type="radio" />
                  <label
                    class="flex flex-col items-center justify-center p-5 rounded-2xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:border-primary/30 transition-all text-slate-500 dark:text-slate-400 group h-32"
                    for="crit-med">
                    <span
                      class="material-symbols-outlined text-3xl mb-2 text-slate-400 group-hover:text-primary transition-colors">pill</span>
                    <span class="text-[10px] font-bold uppercase tracking-wider text-label">Média</span>
                  </label>
                </div>
                <div class="flex-1">
                  <input class="hidden pill-radio" id="crit-high" name="criticality" type="radio" />
                  <label
                    class="flex flex-col items-center justify-center p-5 rounded-2xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:border-primary/30 transition-all text-slate-500 dark:text-slate-400 group h-32"
                    for="crit-high">
                    <span
                      class="material-symbols-outlined text-3xl mb-2 text-slate-400 group-hover:text-primary transition-colors">pill</span>
                    <span class="text-[10px] font-bold uppercase tracking-wider text-label">Alta</span>
                  </label>
                </div>
              </div>
            </div>
            <!-- Notification Channel Section -->
            <div class="p-8">
              <h3 class="text-[11px] font-bold uppercase tracking-[0.15em] text-primary mb-6">Canais de Notificação</h3>
              <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                  <input checked="" class="hidden channel-checkbox" id="chan-app" type="checkbox" />
                  <label
                    class="flex flex-col items-center gap-3 p-5 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer text-center transition-all group hover:border-primary/30 h-28 justify-center"
                    for="chan-app">
                    <span
                      class="material-symbols-outlined text-slate-400 text-2xl group-hover:text-primary">notifications_active</span>
                    <span
                      class="text-[10px] font-bold text-slate-600 dark:text-slate-300 uppercase tracking-tight">App</span>
                  </label>
                </div>
                <div>
                  <input class="hidden channel-checkbox" id="chan-sms" type="checkbox" />
                  <label
                    class="flex flex-col items-center gap-3 p-5 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer text-center transition-all group hover:border-primary/30 h-28 justify-center"
                    for="chan-sms">
                    <span class="material-symbols-outlined text-slate-400 text-2xl group-hover:text-primary">sms</span>
                    <span
                      class="text-[10px] font-bold text-slate-600 dark:text-slate-300 uppercase tracking-tight">SMS</span>
                  </label>
                </div>
                <div>
                  <input class="hidden channel-checkbox" id="chan-wa" type="checkbox" />
                  <label
                    class="flex flex-col items-center gap-3 p-5 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer text-center transition-all group hover:border-primary/30 h-28 justify-center"
                    for="chan-wa">
                    <span class="material-symbols-outlined text-slate-400 text-2xl group-hover:text-primary">chat</span>
                    <span
                      class="text-[10px] font-bold text-slate-600 dark:text-slate-300 uppercase tracking-tight">WhatsApp</span>
                  </label>
                </div>
                <div>
                  <input class="hidden channel-checkbox" id="chan-email" type="checkbox" />
                  <label
                    class="flex flex-col items-center gap-3 p-5 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer text-center transition-all group hover:border-primary/30 h-28 justify-center"
                    for="chan-email">
                    <span class="material-symbols-outlined text-slate-400 text-2xl group-hover:text-primary">mail</span>
                    <span
                      class="text-[10px] font-bold text-slate-600 dark:text-slate-300 uppercase tracking-tight">E-mail</span>
                  </label>
                </div>
              </div>
            </div>
            <!-- Form Actions -->
            <div class="p-8 bg-slate-50/50 dark:bg-slate-800/20 flex flex-col-reverse sm:flex-row gap-4">
              <button
                class="flex-1 px-8 py-4 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-sm"
                type="button">
                Cancelar
              </button>
              <button
                class="flex-1 px-8 py-4 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 text-sm"
                type="submit">
                <span class="material-symbols-outlined text-xl">save</span>
                Salvar Medicamento
              </button>
            </div>
          </form>
          <!-- Guiding Tip -->
          <div class="mt-10 p-6 bg-primary/5 border border-primary/10 rounded-xl flex items-start gap-4">
            <div
              class="size-10 shrink-0 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center text-primary shadow-sm border border-primary/5">
              <span class="material-symbols-outlined text-xl">tips_and_updates</span>
            </div>
            <div class="flex flex-col justify-center h-10">
              <p class="text-primary font-bold text-[10px] uppercase tracking-[0.1em]">Dica de Bem-estar</p>
              <p class="text-slate-600 dark:text-slate-400 text-sm leading-snug">Medicamentos de criticidade
                <strong>Alta</strong> terão alertas persistentes para sua segurança.</p>
            </div>
          </div>
        </div>
      </main>
      <!-- Footer -->
      <footer class="py-12 flex flex-col items-center justify-center gap-4 text-slate-400 dark:text-slate-600">
        <div class="h-px w-24 bg-slate-100 dark:bg-slate-800"></div>
        <p class="text-sm">© 2026 Pills Inc.</p>
      </footer>
    </div>
  </div>
</body>

</html>
